name: Deploy docs to Pages

# Builds the Docusaurus site under `website/` (all locales) and deploys it to GitHub Pages.
#
# One-time repository setup (Settings -> Pages): set "Build and deployment -> Source" to
# "GitHub Actions". No branch selection is needed; this workflow is the source.
#
# The site's url/baseUrl are pinned in website/docusaurus.config.js to einsia.github.io / /agent-git/.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Pages deploys need these three; nothing here writes to repo contents.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time. Don't cancel an in-flight deploy; let it finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (all locales)
        run: npm run build
      - uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
