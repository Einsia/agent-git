name: CI

# Continuous integration for the `agit` workspace (two binaries: `agit`, `agit-hub`).
#
# Every command below was run locally against this tree before this file was committed and each
# exited 0. clippy is a BLOCKING gate (`-D warnings`); rustfmt is report-only because the codebase
# has an established hand-formatting no rustfmt config reproduces (see the fmt job).
#
# Toolchain: the repo pins `stable` (+ rustfmt, clippy) in rust-toolchain.toml, which the runner's
# preinstalled rustup honors automatically. We still `rustup component add` explicitly so the
# fmt/clippy components are guaranteed present regardless of the runner image.

on:
  push:
    branches: ['**']
  pull_request:

# Newer pushes to the same ref supersede in-flight runs, so we don't burn minutes on stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# CI only reads the repo; no job here needs write access to anything.
permissions:
  contents: read

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build (workspace, all targets)
        run: cargo build --workspace --all-targets
      - name: Test (workspace)
        # ~326 tests across the lib, both bins, and the integration suites in tests/.
        run: cargo test --workspace

  fmt:
    name: rustfmt (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      # TODO: tighten to a blocking `cargo fmt --all --check` once the formatting/clippy-clean task
      # lands. The current tree is NOT rustfmt-clean and this workflow is not permitted to reformat
      # it, and no rustfmt.toml can make the existing hand-formatting pass (verified: hunks remain
      # even at max_width=200 — they are import-grouping and brace-style, not line width). So for now
      # we surface the diff as a warning without failing the job. When the cleanup merges, drop the
      # `|| { ... }` wrapper below so a dirty tree fails CI again.
      - name: rustfmt --check (non-blocking)
        run: |
          if ! cargo fmt --all --check; then
            echo "::warning title=rustfmt::Tree is not rustfmt-clean (known). NOT failing CI yet — see the TODO in .github/workflows/ci.yml. Flip this step to blocking once the formatting cleanup lands."
          fi

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      # BLOCKING: the tree is clippy-clean (`-D warnings` exits 0). Two pedantic doc-comment lints
      # (doc_overindented_list_items, doc_lazy_continuation) are allowed at each crate root — the
      # comment style there is deliberate, and they are formatting, not correctness.
      - name: clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  windows-check:
    name: cross-check (windows)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The release builds for x86_64-pc-windows-msvc, but the other CI jobs run on Linux, so a
    # Unix-only API (os::unix, process_group, file mode bits) can slip through and only fail the
    # release. `cargo check` for the Windows target type-checks the platform cfgs without needing the
    # MSVC linker — cheap, on a Linux runner, and it catches that class of breakage before a tag.
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + Windows target
        run: rustup target add x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-check
      - name: cargo check (windows target, no link)
        run: cargo check --workspace --bins --target x86_64-pc-windows-msvc

  hub-e2e:
    name: hub e2e (demo/hub-e2e.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      # The script asserts ~267 checks against a REAL agit-hub server started on 127.0.0.1:8194.
      # It needs git, curl, python3 and jq — all preinstalled on ubuntu-latest. jq is installed
      # defensively only if the image ever drops it; the others are guaranteed present.
      - name: Verify e2e prerequisites
        run: |
          for t in git curl python3; do
            command -v "$t" >/dev/null || { echo "missing required tool: $t" >&2; exit 1; }
          done
          command -v jq >/dev/null || { sudo apt-get update && sudo apt-get install -y jq; }
      - name: Build agit-hub (release)
        run: cargo build --release --bin agit-hub
      - name: Run hub end-to-end acceptance
        run: ./demo/hub-e2e.sh

  hub-live:
    name: hub live (Postgres + Garage)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Proves the PRODUCTION storage backends (Postgres for the store, Garage/S3 for blobs) on every
    # push, not just via a hand-run script. demo/hub-e2e.sh already covers the SQLite/fs default; this
    # job runs scripts/hub-live-e2e.sh (~103 checks) against a REAL Postgres 16 and a REAL Garage
    # single-node cluster, including live proofs the default can't make: Postgres persistence across a
    # hub restart, no plaintext password/token in Postgres (psql), and blobs physically present in the
    # Garage bucket (rename moves the object's prefix, purge deletes it).
    #
    # Credentials here are EPHEMERAL and CI-ONLY: Postgres uses a throwaway user/password below and
    # Garage mints a fresh access/secret key per run (captured into $GITHUB_ENV). No real secrets.
    services:
      # Postgres runs as a health-checked service container; the runner publishes it on localhost:5432.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agithub
          POSTGRES_PASSWORD: agithub
          POSTGRES_DB: agithub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agithub -d agithub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # The hub reads these; the script defaults match but we set them explicitly for clarity. The S3
      # access/secret are injected at runtime by the Garage init step via $GITHUB_ENV.
      AGIT_HUB_DB: postgres://agithub:agithub@127.0.0.1:5432/agithub
      AGIT_HUB_BIN: ${{ github.workspace }}/target/release/agit-hub
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: hub-live
      # The live script drives Postgres with `psql` (over TCP, via AGIT_HUB_DB) and inspects the
      # Garage bucket with the `aws` CLI. Both are usually preinstalled on ubuntu-latest; install
      # defensively only if missing so the job is robust across runner image changes.
      - name: Install e2e client tools (psql, awscli)
        run: |
          need_apt=0
          command -v psql >/dev/null || need_apt=1
          command -v aws  >/dev/null || need_apt=1
          if [ "$need_apt" = 1 ]; then sudo apt-get update; fi
          command -v psql >/dev/null || sudo apt-get install -y postgresql-client
          command -v aws  >/dev/null || sudo apt-get install -y awscli
          for t in git curl aws psql; do
            command -v "$t" >/dev/null || { echo "missing required tool: $t" >&2; exit 1; }
          done
      - name: Build agit-hub (release)
        run: cargo build --release --bin agit-hub
      # Garage can't be a plain `services:` container: it needs a config file (not available until
      # after checkout) and a one-time layout/bucket/key init that must run AFTER the node is up and
      # must capture the freshly-minted S3 key. So we start it with `docker run` and initialize it in
      # this step, reusing the repo's own deploy/garage.toml (single-node, replication_factor 1).
      - name: Start Garage (S3 blob backend) + init layout/bucket/key
        run: |
          set -euo pipefail
          docker run -d --name garage \
            -p 127.0.0.1:3900:3900 \
            -v "$PWD/deploy/garage.toml:/etc/garage.toml:ro" \
            dxflrs/garage:v1.0.1
          # Wait until the node answers RPC (layout/bucket/key commands need a live node).
          for i in $(seq 1 60); do
            if docker exec garage /garage status >/dev/null 2>&1; then ready=1; break; fi
            sleep 1
          done
          [ "${ready:-0}" = 1 ] || { echo "garage did not become ready"; docker logs garage; exit 1; }
          # Single-node layout: assign the node capacity, then create the bucket and a fresh key.
          NODE_ID="$(docker exec garage /garage node id -q | cut -d@ -f1)"
          docker exec garage /garage layout assign -z dc1 -c 1G "$NODE_ID"
          docker exec garage /garage layout apply --version 1
          docker exec garage /garage bucket create agit-blobs
          docker exec garage /garage key create ci-key
          docker exec garage /garage bucket allow --read --write agit-blobs --key ci-key
          ACCESS="$(docker exec garage /garage key info ci-key --show-secret | sed -n 's/^Key ID: //p')"
          SECRET="$(docker exec garage /garage key info ci-key --show-secret | sed -n 's/^Secret key: //p')"
          [ -n "$ACCESS" ] && [ -n "$SECRET" ] || { echo "failed to capture Garage key"; exit 1; }
          {
            echo "AGIT_HUB_S3_ENDPOINT=http://127.0.0.1:3900"
            echo "AGIT_HUB_S3_BUCKET=agit-blobs"
            echo "AGIT_HUB_S3_REGION=garage"
            echo "AGIT_HUB_S3_ACCESS_KEY=$ACCESS"
            echo "AGIT_HUB_S3_SECRET_KEY=$SECRET"
          } >> "$GITHUB_ENV"
      - name: Run live Postgres + Garage end-to-end (scripts/hub-live-e2e.sh)
        run: ./scripts/hub-live-e2e.sh
