# TLS-terminated production topology for agit-hub.
#
#   client ──HTTPS──▶ caddy (:443) ──HTTP──▶ hub (:8177)
#
# Caddy terminates HTTPS and reverse-proxies to the hub over the internal Docker
# network. The hub binds 0.0.0.0 inside the container with --tls ("TLS terminated
# in front") and trusts Caddy's fixed address, so the per-IP rate limit keys on
# the real client IP that Caddy forwards, not on Caddy itself.
#
# Bring it up (from the repo root):
#   HUB_DOMAIN=hub.example.com docker compose -f deploy/docker-compose.yml up -d --build
#
# Create the first admin (interactive — the password prompt needs a TTY, hence -T
# is NOT passed):
#   docker compose -f deploy/docker-compose.yml exec hub agit-hub user add you --admin
#
# The hub's data root is the /data volume; every `exec hub agit-hub …` command
# resolves --root from $HOME=/data automatically (see the Dockerfile), so no
# --root flag is needed for admin commands here.
#
# Persistence backend: relational, chosen by AGIT_HUB_DB. This topology points the
# hub at the bundled Postgres (below) — the production backend. Omit AGIT_HUB_DB
# (or unset it) and the hub falls back to a zero-config SQLite file (hub.db) under
# /data instead, which is fine for a single-node self-host. Either way the bare git
# repos and audit.log still live on the /data volume; only users/agents/tokens/MRs
# move into the database.
#
# Blob backend (content-addressed object storage): chosen by AGIT_HUB_S3_ENDPOINT,
# and ORTHOGONAL to the Postgres/SQLite choice above. Leave the hub's S3 env UNSET
# (the default here) and blobs are stored on the /data volume under <root>/blobs —
# the zero-config path, no extra service needed. Set the S3 env (see the commented
# block in the hub service) to store blobs in the bundled Garage service instead.
#
# Garage does NOT auto-create its layout/bucket/key, so a Garage-backed deploy needs
# a ONE-TIME init (like creating the first admin). After `up`, run once:
#   # 1. Assign a storage layout to the single node (grab its id from `status`):
#   docker compose -f deploy/docker-compose.yml exec garage /garage status
#   docker compose -f deploy/docker-compose.yml exec garage /garage layout assign -z dc1 -c 1G <node-id>
#   docker compose -f deploy/docker-compose.yml exec garage /garage layout apply --version 1
#   # 2. Create the bucket the hub will use:
#   docker compose -f deploy/docker-compose.yml exec garage /garage bucket create agit-blobs
#   # 3. Mint an access key (prints an Access Key ID + Secret — capture both):
#   docker compose -f deploy/docker-compose.yml exec garage /garage key create agit-hub-key
#   # 4. Grant that key read+write on the bucket:
#   docker compose -f deploy/docker-compose.yml exec garage /garage bucket allow --read --write agit-blobs --key agit-hub-key
# Then bring the hub up with the key material and the S3 env uncommented:
#   GARAGE_ACCESS_KEY=<id> GARAGE_SECRET_KEY=<secret> docker compose -f deploy/docker-compose.yml up -d

services:
  hub:
    build:
      context: ..
      dockerfile: Dockerfile
    image: agit-hub:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - garage
    # Postgres is the production backend. Drop this line to fall back to SQLite on
    # the /data volume. The password is shared with the postgres service below.
    environment:
      AGIT_HUB_DB: postgres://agithub:${PGPASSWORD:-agithub}@postgres:5432/agithub
      # Uncomment to store blobs in Garage instead of on the /data volume (the keys
      # come from `garage key create` — see the one-time init in the header):
      # AGIT_HUB_S3_ENDPOINT: http://garage:3900
      # AGIT_HUB_S3_BUCKET: agit-blobs
      # AGIT_HUB_S3_REGION: garage
      # AGIT_HUB_S3_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      # AGIT_HUB_S3_SECRET_KEY: ${GARAGE_SECRET_KEY}
    # Only Caddy's address is pinned (below), so the hub can trust it precisely.
    command:
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "8177"
      - --tls
      - --trusted-proxy
      - 172.28.0.2
    volumes:
      - hub-data:/data
    networks:
      edge:
    # No published ports: the hub is reachable only through Caddy.
    expose:
      - "8177"

  # Production metadata store. The hub creates its own tables at boot (idempotent
  # migrations gated by a schema_version row), so no init SQL is needed here.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agithub
      POSTGRES_PASSWORD: ${PGPASSWORD:-agithub}
      POSTGRES_DB: agithub
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      edge:
    # Loopback-only publish for local inspection; drop it to keep Postgres purely
    # internal to the compose network.
    expose:
      - "5432"

  # S3-compatible object storage for the hub's content-addressed blob store. Only
  # actually used when the hub's AGIT_HUB_S3_* env is set (above); otherwise it sits
  # idle and blobs stay on the /data volume. Internal to the compose network, like
  # Postgres — never published. Requires the one-time init documented in the header.
  garage:
    image: dxflrs/garage:v1.0.1
    restart: unless-stopped
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    networks:
      edge:
    # The S3 API port; internal to the compose network (the hub reaches it at
    # http://garage:3900). Not published to the host.
    expose:
      - "3900"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - hub
    ports:
      - "80:80"
      - "443:443"
    environment:
      # The name Caddy serves and obtains a certificate for. Override per deploy;
      # defaults to localhost for a local trial.
      HUB_DOMAIN: ${HUB_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # Caddy's ACME account + issued certificates — persist!
      - caddy-config:/config
    networks:
      edge:
        # Fixed address so the hub's --trusted-proxy can name it exactly.
        ipv4_address: 172.28.0.2

networks:
  edge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  hub-data:      # the hub's data root (audit.log, bare repos, and hub.db when on the SQLite backend)
  pg-data:       # Postgres data directory (the metadata store when on the Postgres backend)
  garage-meta:   # Garage's metadata (layout, bucket/key registry) when blobs are on the S3 backend
  garage-data:   # Garage's object data blocks when blobs are on the S3 backend
  caddy-data:    # Caddy's certificates + ACME account
  caddy-config:
