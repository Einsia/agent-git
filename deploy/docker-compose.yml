# TLS-terminated production topology for agit-hub.
#
#   client ──HTTPS──▶ caddy (:443) ──HTTP──▶ hub (:8177)
#
# Caddy terminates HTTPS and reverse-proxies to the hub over the internal Docker
# network. The hub binds 0.0.0.0 inside the container with --tls ("TLS terminated
# in front") and trusts Caddy's fixed address, so the per-IP rate limit keys on
# the real client IP that Caddy forwards, not on Caddy itself.
#
# Bring it up (from the repo root):
#   HUB_DOMAIN=hub.example.com docker compose -f deploy/docker-compose.yml up -d --build
#
# Create the first admin (interactive — the password prompt needs a TTY, hence -T
# is NOT passed):
#   docker compose -f deploy/docker-compose.yml exec hub agit-hub user add you --admin
#
# The hub's data root is the /data volume; every `exec hub agit-hub …` command
# resolves --root from $HOME=/data automatically (see the Dockerfile), so no
# --root flag is needed for admin commands here.
#
# Persistence backend: relational, chosen by AGIT_HUB_DB. This topology points the
# hub at the bundled Postgres (below) — the production backend. Omit AGIT_HUB_DB
# (or unset it) and the hub falls back to a zero-config SQLite file (hub.db) under
# /data instead, which is fine for a single-node self-host. Either way the bare git
# repos and audit.log still live on the /data volume; only users/agents/tokens/MRs
# move into the database.

services:
  hub:
    build:
      context: ..
      dockerfile: Dockerfile
    image: agit-hub:latest
    restart: unless-stopped
    depends_on:
      - postgres
    # Postgres is the production backend. Drop this line to fall back to SQLite on
    # the /data volume. The password is shared with the postgres service below.
    environment:
      AGIT_HUB_DB: postgres://agithub:${PGPASSWORD:-agithub}@postgres:5432/agithub
    # Only Caddy's address is pinned (below), so the hub can trust it precisely.
    command:
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "8177"
      - --tls
      - --trusted-proxy
      - 172.28.0.2
    volumes:
      - hub-data:/data
    networks:
      edge:
    # No published ports: the hub is reachable only through Caddy.
    expose:
      - "8177"

  # Production metadata store. The hub creates its own tables at boot (idempotent
  # migrations gated by a schema_version row), so no init SQL is needed here.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agithub
      POSTGRES_PASSWORD: ${PGPASSWORD:-agithub}
      POSTGRES_DB: agithub
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      edge:
    # Loopback-only publish for local inspection; drop it to keep Postgres purely
    # internal to the compose network.
    expose:
      - "5432"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - hub
    ports:
      - "80:80"
      - "443:443"
    environment:
      # The name Caddy serves and obtains a certificate for. Override per deploy;
      # defaults to localhost for a local trial.
      HUB_DOMAIN: ${HUB_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # Caddy's ACME account + issued certificates — persist!
      - caddy-config:/config
    networks:
      edge:
        # Fixed address so the hub's --trusted-proxy can name it exactly.
        ipv4_address: 172.28.0.2

networks:
  edge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  hub-data:      # the hub's data root (audit.log, bare repos, and hub.db when on the SQLite backend)
  pg-data:       # Postgres data directory (the metadata store when on the Postgres backend)
  caddy-data:    # Caddy's certificates + ACME account
  caddy-config:
