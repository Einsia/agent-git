[package]
name = "agit"
version = "0.1.0"
edition = "2021"
description = "Git for agent context: claims carry provenance, evidence expires, merges surface conflicts."
license = "MIT"

[[bin]]
name = "agit"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
tempfile = "3"
sha2 = "0.10"
hex = "0.4"
anyhow = "1"
regex = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
walkdir = "2"
once_cell = "1"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = "z"
lto = true
strip = true
