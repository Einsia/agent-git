[package]
name = "agit"
version = "0.1.0"
edition = "2021"
description = "Git for agent context: version raw agent session dumps, sync with your team, LLM-merge on pull."
license = "MIT"

[lib]
name = "agit"
path = "src/lib.rs"

[[bin]]
name = "agit"
path = "src/main.rs"

[[bin]]
name = "agit-hub"
path = "src/bin/agit-hub/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
axum = { version = "0.8", features = ["macros"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "process", "io-util", "signal", "sync", "time"] }
tower = { version = "0.5", features = ["limit", "util"] }
tower-http = { version = "0.6", features = ["trace"] }
tokio-util = { version = "0.7", features = ["io"] }
bytes = "1"
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
tempfile = "3"
sha2 = "0.10"
hex = "0.4"
anyhow = "1"
regex = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
walkdir = "2"
once_cell = "1"
argon2 = "0.5.3"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = "z"
lto = true
strip = true
