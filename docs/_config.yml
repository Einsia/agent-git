title: agit
description: Version control for AI coding-agent sessions.
remote_theme: just-the-docs/just-the-docs
url: https://einsia.github.io
baseurl: /agent-git

# just-the-docs
search_enabled: true
heading_anchors: true
color_scheme: dark
aux_links:
  Repository: https://github.com/Einsia/agent-git
aux_links_new_tab: true

# Kept in the repo, but not part of the published wiki: the design history, the
# contributor architecture doc, and the Chinese translation.
exclude:
  - plans/
  - architecture.md
  - demo-walkthrough.md
  - 使用介绍.md
  - 使用说明.md
  - 风险分析.md
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: ""
    values:
      layout: default
